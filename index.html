<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Prático - Operação Cerco Fechado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #1a252f;
            color: white;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Container das Abas */
        .tabs-container {
            background-color: #2c3e50;
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 3px solid #34495e;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #bdc3c7;
            padding: 14px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            border-right: 1px solid #34495e;
        }

        .tab-btn:hover {
            background-color: #34495e;
            color: white;
        }

        .tab-btn.active {
            background-color: #3498db;
            color: white;
        }

        /* Área do Mapa */
        .map-content {
            flex: 1;
            position: relative;
            background-color: #e5e5e5;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        iframe.active {
            display: block;
        }

        /* Ajuste para rolagem suave em telas menores */
        .tabs-container::-webkit-scrollbar {
            height: 5px;
        }
        .tabs-container::-webkit-scrollbar-thumb {
            background: #7f8c8d;
        }
    </style>
</head>
<body>

    <header>
        <h1>Operação Cerco Fechado - Painel de Análise Criminal</h1>
    </header>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab(event, 'mapa1')">Armas (Pontos)</button>
        <button class="tab-btn" onclick="switchTab(event, 'mapa2')">Homicídios (Pontos)</button>
        <button class="tab-btn" onclick="switchTab(event, 'mapa3')">Tráfico (Hexagonal)</button>
        <button class="tab-btn" onclick="switchTab(event, 'mapa4')">3 Naturezas (Hexagonal)</button>
        <button class="tab-btn" onclick="switchTab(event, 'mapa5')">3 Naturezas PCC (Hexagonal)</button>
    </div>

    <div class="map-content">
        <iframe id="mapa1" class="active" src="armas-mapa-pontos.html"></iframe>
        <iframe id="mapa2" src="homicidios_mapa_pontos.html"></iframe>
        <iframe id="mapa3" src="trafico-drogas-mapa-hexagonal.html"></iframe>
        <iframe id="mapa4" src="tres_naturezas_mapa_hexagonal.html"></iframe>
        <iframe id="mapa5" src="tres_naturezas_pcc_mapa_hexagonal.html"></iframe>
    </div>

    <script>
        function switchTab(event, mapId) {
            // Remove a classe ativa de todos os botões
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            // Remove a classe ativa de todos os iframes (esconde os mapas)
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => iframe.classList.remove('active'));

            // Adiciona a classe ativa no botão clicado e mostra o mapa correspondente
            event.currentTarget.classList.add('active');
            document.getElementById(mapId).classList.add('active');
        }
    </script>

</body>
</html>
